<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>KinoMoz — фильмы и сериалы</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>">
    <style>
        :root {
            --bg: #0a0a0f;
            --card: #16161d;
            --card-hover: #1e1e28;
            --text: #eee;
            --text-secondary: #999;
            --accent: #e50914;
            --accent-hover: #ff1a2a;
            --shadow: rgba(229, 9, 20, 0.3);
            --header-bg: rgba(10, 10, 15, 0.92);
            --border: #2a2a35;
            --radius: 12px;
            --transition: 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            --font: -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        [data-theme="light"] {
            --bg: #f0f0f5;
            --card: #ffffff;
            --card-hover: #f5f5fa;
            --text: #1a1a1f;
            --text-secondary: #666;
            --shadow: rgba(0,0,0,0.1);
            --header-bg: rgba(240, 240, 245, 0.95);
            --border: #ddd;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            transition: background var(--transition), color var(--transition);
            padding: 0 12px 30px;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        header {
            background: var(--header-bg);
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            border-bottom: 2px solid var(--accent);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            margin: 0 -12px 16px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo {
            font-size: 22px;
            font-weight: 900;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--accent), #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .logo span {
            font-weight: 300;
            background: none;
            -webkit-text-fill-color: var(--text);
            font-size: 14px;
        }
        .header-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .header-controls .count {
            font-size: 13px;
            opacity: 0.6;
            background: var(--card);
            padding: 4px 12px;
            border-radius: 16px;
            border: 1px solid var(--border);
            white-space: nowrap;
        }
        .theme-toggle {
            background: var(--card);
            border: 2px solid var(--border);
            color: var(--text);
            padding: 5px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: var(--transition);
            min-width: 44px;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .theme-toggle:hover {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }
        .nav-tabs {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            max-width: 1400px;
            margin: 0 auto 12px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .nav-tabs::-webkit-scrollbar { display: none; }
        .nav-tabs button {
            background: var(--card);
            border: 2px solid var(--border);
            color: var(--text);
            padding: 6px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: var(--transition);
            flex-shrink: 0;
            min-height: 40px;
            touch-action: manipulation;
        }
        .nav-tabs button:hover { border-color: var(--accent); }
        .nav-tabs button.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
            box-shadow: 0 2px 16px var(--shadow);
        }
        .search-bar {
            max-width: 1400px;
            margin: 0 auto 14px;
        }
        .search-bar input {
            width: 100%;
            padding: 12px 18px;
            border-radius: 30px;
            border: 2px solid var(--border);
            background: var(--card);
            color: var(--text);
            font-size: 15px;
            transition: var(--transition);
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }
        .search-bar input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--shadow);
        }
        .search-bar input::placeholder { opacity: 0.5; }

        /* ===== ПРИВЕТСТВЕННОЕ ОКНО ===== */
        .welcome-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 15, 0.95);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }
        .welcome-overlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        .welcome-content {
            text-align: center;
            animation: welcomeAnim 0.8s ease;
            padding: 20px;
        }
        .welcome-content h1 {
            font-size: 52px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent), #ff6b6b, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }
        .welcome-content p {
            font-size: 18px;
            opacity: 0.6;
            max-width: 500px;
            margin: 0 auto;
            color: var(--text);
        }
        .welcome-content .loader {
            margin-top: 25px;
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes welcomeAnim {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* ===== СЕТКА ===== */
        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 16px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .movie-card {
            background: var(--card);
            border-radius: var(--radius);
            overflow: hidden;
            transition: var(--transition);
            cursor: pointer;
            border: 1px solid var(--border);
            position: relative;
            -webkit-tap-highlight-color: transparent;
        }
        .movie-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent);
            box-shadow: 0 8px 30px var(--shadow);
            background: linear-gradient(135deg, var(--accent), #ff6b6b);
        }
        .movie-card:hover .title { color: #fff; }
        .movie-card:hover .year { color: rgba(255,255,255,0.8); }
        .movie-card:active { transform: scale(0.97); }
        .movie-card img {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
            display: block;
            background: #1a1a2e;
            transition: var(--transition);
        }
        .movie-card:hover img { filter: brightness(0.85); }
        .movie-card .info {
            padding: 8px 10px 10px;
            transition: var(--transition);
        }
        .movie-card .title {
            font-weight: 600;
            font-size: 13px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.3;
            word-break: break-word;
            transition: var(--transition);
        }
        .movie-card .year {
            font-size: 11px;
            opacity: 0.6;
            margin-top: 2px;
            transition: var(--transition);
        }
        .movie-card .badge {
            position: absolute;
            top: 8px;
            right: 8px;
            background: var(--accent);
            color: #fff;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.3px;
            box-shadow: 0 2px 10px rgba(229, 9, 20, 0.4);
            pointer-events: none;
        }
        .movie-card .type-badge {
            position: absolute;
            bottom: 56px;
            left: 8px;
            background: rgba(0,0,0,0.75);
            color: #fff;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 9px;
            font-weight: 600;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            pointer-events: none;
        }

        /* ===== ПАГИНАЦИЯ ===== */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            max-width: 1400px;
            margin: 25px auto 0;
            flex-wrap: wrap;
        }
        .pagination button {
            background: var(--card);
            border: 2px solid var(--border);
            color: var(--text);
            padding: 10px 28px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: var(--transition);
            min-height: 44px;
            touch-action: manipulation;
        }
        .pagination button:hover:not(:disabled) {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
            transform: scale(1.04);
        }
        .pagination button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
        }
        .pagination .info {
            font-size: 14px;
            opacity: 0.6;
            padding: 0 10px;
        }

        /* ===== СОСТОЯНИЯ ===== */
        .loading, .error, .empty {
            text-align: center;
            padding: 60px 16px;
            font-size: 17px;
            opacity: 0.7;
            grid-column: 1 / -1;
        }
        .error { color: #ff6b6b; opacity: 1; }
        .error button {
            margin-top: 16px;
            padding: 10px 28px;
            border-radius: 25px;
            border: none;
            background: var(--accent);
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }
        .error button:hover { transform: scale(1.04); background: var(--accent-hover); }
        .footer {
            text-align: center;
            margin-top: 35px;
            opacity: 0.4;
            font-size: 12px;
            border-top: 1px solid var(--border);
            padding-top: 18px;
        }

        /* ===== АДАПТИВ ===== */
        @media (max-width: 500px) {
            .movie-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; }
            .logo { font-size: 18px; }
            .logo span { font-size: 12px; }
            header { padding: 8px 12px; margin: 0 -12px 12px; }
            .nav-tabs button { padding: 4px 12px; font-size: 12px; min-height: 34px; }
            .search-bar input { padding: 10px 14px; font-size: 14px; }
            .movie-card .title { font-size: 12px; }
            .pagination button { padding: 8px 18px; font-size: 13px; min-height: 38px; }
            .welcome-content h1 { font-size: 32px; }
            .welcome-content p { font-size: 15px; }
        }
        @media (max-width: 380px) {
            .movie-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; }
        }
        @media (min-width: 1200px) {
            .movie-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 22px; }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .movie-card {
            animation: fadeInUp 0.35s ease both;
            will-change: transform, opacity;
        }
        .movie-card:nth-child(1) { animation-delay: 0.01s; }
        .movie-card:nth-child(2) { animation-delay: 0.02s; }
        .movie-card:nth-child(3) { animation-delay: 0.03s; }
        .movie-card:nth-child(4) { animation-delay: 0.04s; }
        .movie-card:nth-child(5) { animation-delay: 0.05s; }
        .movie-card:nth-child(6) { animation-delay: 0.06s; }
        .movie-card:nth-child(7) { animation-delay: 0.07s; }
        .movie-card:nth-child(8) { animation-delay: 0.08s; }
        .movie-card:nth-child(9) { animation-delay: 0.09s; }
        .movie-card:nth-child(10) { animation-delay: 0.10s; }
        .movie-card:nth-child(11) { animation-delay: 0.11s; }
        .movie-card:nth-child(12) { animation-delay: 0.12s; }
        .movie-card:nth-child(13) { animation-delay: 0.13s; }
        .movie-card:nth-child(14) { animation-delay: 0.14s; }
        .movie-card:nth-child(15) { animation-delay: 0.15s; }
    </style>
</head>

        // ================================================================
        //  ЛОГИКА РАБОТЫ
        // ================================================================
        const ITEMS_PER_PAGE = 15;
        let allMovies = [];
        let currentFilter = 'all';
        let currentPage = 1;
        let filteredMovies = [];

        function initMovies() {
            allMovies = MOVIES_DATA.map(m => ({
                ...m,
                posterUrl: m.poster.startsWith('http') ? m.poster : 'https://mm.lordfilmdesign.lat' + m.poster,
                linkUrl: m.link.startsWith('http') ? m.link : 'https://mm.lordfilmdesign.lat' + m.link
            }));
            filteredMovies = allMovies;
            currentPage = 1;
            
            // Показываем контент сразу, но приветствие исчезнет через 2 секунды
            renderPage();
            document.getElementById('movieCount').textContent = allMovies.length + ' фильмов';
            document.getElementById('updateTime').textContent = new Date().toLocaleString();
            
            // Плавно скрываем приветствие через 2 секунды
            setTimeout(() => {
                document.getElementById('welcomeOverlay').classList.add('hidden');
            }, 2000);
        }

        function renderPage() {
            const grid = document.getElementById('movieGrid');
            const totalPages = Math.ceil(filteredMovies.length / ITEMS_PER_PAGE) || 1;
            
            if (currentPage > totalPages) currentPage = totalPages;
            if (currentPage < 1) currentPage = 1;

            const start = (currentPage - 1) * ITEMS_PER_PAGE;
            const end = Math.min(start + ITEMS_PER_PAGE, filteredMovies.length);
            const pageMovies = filteredMovies.slice(start, end);

            if (filteredMovies.length === 0) {
                grid.innerHTML = `<div class="empty">😕 Ничего не найдено</div>`;
                updatePagination(0, 1);
                return;
            }

            grid.innerHTML = pageMovies.map((m, index) => {
                const typeLabel = m.type === 'movie' ? '🎬 Фильм' : '📺 Сериал';
                return `
                    <div class="movie-card" onclick="window.open('${m.linkUrl}', '_blank')" style="animation-delay: ${(index % 12) * 0.02}s;">
                        <img src="${m.posterUrl}" alt="${m.title}" loading="lazy" 
                             onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 200 300%22><rect fill=%22%231a1a2e%22 width=%22200%22 height=%22300%22/><text x=%2250%%22 y=%2250%%22 text-anchor=%22middle%22 dominant-baseline=%22central%22 fill=%22%23666%22 font-size=%2216%22>${encodeURIComponent(m.title)}</text></svg>'">
                        <div class="info">
                            <div class="title">${m.title}</div>
                            ${m.year ? `<div class="year">📅 ${m.year}</div>` : ''}
                        </div>
                        <div class="badge">▶</div>
                        <div class="type-badge">${typeLabel}</div>
                    </div>
                `;
            }).join('');

            updatePagination(filteredMovies.length, totalPages);
            document.getElementById('movieCount').textContent = filteredMovies.length + ' из ' + allMovies.length;
        }

        function updatePagination(total, totalPages) {
            document.getElementById('prevPage').disabled = currentPage <= 1;
            document.getElementById('nextPage').disabled = currentPage >= totalPages;
            const start = (currentPage - 1) * ITEMS_PER_PAGE + 1;
            const end = Math.min(currentPage * ITEMS_PER_PAGE, total);
            document.getElementById('pageInfo').textContent = total > 0 ? `${start}-${end} из ${total}` : '0';
        }

        function changePage(delta) {
            const totalPages = Math.ceil(filteredMovies.length / ITEMS_PER_PAGE) || 1;
            const newPage = currentPage + delta;
            if (newPage >= 1 && newPage <= totalPages) {
                currentPage = newPage;
                renderPage();
                document.querySelector('.movie-grid').scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        function filterMovies() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            let filtered = allMovies;

            if (currentFilter !== 'all') {
                filtered = filtered.filter(m => m.type === currentFilter);
            }

            if (query) {
                filtered = filtered.filter(m => m.title.toLowerCase().includes(query));
            }

            filteredMovies = filtered;
            currentPage = 1;
            renderPage();
        }

        document.getElementById('navTabs').addEventListener('click', (e) => {
            const btn = e.target.closest('button');
            if (!btn) return;
            document.querySelectorAll('#navTabs button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.dataset.filter;
            document.getElementById('searchInput').value = '';
            filterMovies();
        });

        function toggleTheme() {
            const html = document.documentElement;
            const btn = document.querySelector('.theme-toggle');
            const isLight = html.getAttribute('data-theme') === 'light';
            if (isLight) {
                html.removeAttribute('data-theme');
                btn.textContent = '🌙';
                localStorage.setItem('theme', 'dark');
            } else {
                html.setAttribute('data-theme', 'light');
                btn.textContent = '☀️';
                localStorage.setItem('theme', 'light');
            }
        }

        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
            document.querySelector('.theme-toggle').textContent = '☀️';
        }

        // ===== ЗАПУСК =====
        initMovies();
    </script>
