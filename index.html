<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEVAS Клон (офлайн-версия)</title>
    <style>
        /* Стили те же, что и в прошлом коде — для краткости я их сократил */
        :root { --bg: #0a0a0f; --card: #16161d; --text: #eee; --accent: #6c5ce7; --shadow: rgba(108,92,231,0.3); }
        [data-theme="light"] { --bg: #f0f0f5; --card: #ffffff; --text: #1a1a1f; --accent: #6c5ce7; --shadow: rgba(0,0,0,0.1); }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:var(--bg); color:var(--text); font-family:'Segoe UI',sans-serif; transition:.3s; padding:20px; }
        header { display:flex; justify-content:space-between; align-items:center; max-width:1400px; margin:0 auto 30px; flex-wrap:wrap; gap:15px; }
        .logo { font-size:28px; font-weight:900; background:linear-gradient(135deg,var(--accent),#a29bfe); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .theme-toggle { background:var(--card); border:none; color:var(--text); padding:10px 20px; border-radius:30px; cursor:pointer; font-size:16px; box-shadow:0 4px 15px var(--shadow); transition:.3s; }
        .theme-toggle:hover { transform:scale(1.05); }
        .search-bar { max-width:1400px; margin:0 auto 30px; }
        .search-bar input { width:100%; padding:15px 20px; border-radius:50px; border:2px solid var(--card); background:var(--card); color:var(--text); font-size:16px; transition:.3s; outline:none; }
        .search-bar input:focus { border-color:var(--accent); box-shadow:0 0 20px var(--shadow); }
        .movie-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:25px; max-width:1400px; margin:0 auto; }
        .movie-card { background:var(--card); border-radius:16px; overflow:hidden; transition:.3s; cursor:pointer; box-shadow:0 4px 20px rgba(0,0,0,0.3); position:relative; }
        .movie-card:hover { transform:translateY(-10px) scale(1.02); box-shadow:0 12px 40px var(--shadow); }
        .movie-card img { width:100%; aspect-ratio:2/3; object-fit:cover; display:block; }
        .movie-card .info { padding:12px 15px 15px; }
        .movie-card .title { font-weight:600; font-size:15px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; line-height:1.3; }
        .movie-card .year { opacity:0.6; font-size:13px; margin-top:4px; }
        .badge { position:absolute; top:10px; right:10px; background:var(--accent); color:#fff; padding:4px 12px; border-radius:20px; font-size:11px; font-weight:700; }
        .footer { text-align:center; margin-top:50px; opacity:0.5; font-size:14px; }
        @media (max-width:600px) { .movie-grid { grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:15px; } .logo { font-size:22px; } }
        .loading, .error, .empty { text-align:center; padding:60px 20px; font-size:18px; opacity:0.7; grid-column:1/-1; }
        .error { color:#ff6b6b; }
    </style>
</head>
<body>
    <header>
        <div class="logo">🎬 TEVAS <span style="font-weight:300;background:none;-webkit-text-fill-color:var(--text);">клон</span></div>
        <button class="theme-toggle" onclick="toggleTheme()">🌙 Тёмная</button>
    </header>
    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="🔍 Поиск фильмов..." oninput="filterMovies()">
    </div>
    <div class="movie-grid" id="movieGrid">
        <div class="loading">📥 Загрузка данных...</div>
    </div>
    <div class="footer">Данные собраны с tevas.work • Фильмов: <span id="count">0</span></div>

    <script>
        // ===== ВСТАВЬ СЮДА ДАННЫЕ (JSON), КОТОРЫЕ Я ТЕБЕ ПРИШЛЮ =====
        const MOVIES_DATA = [];

        // ===========================================================

        let allMovies = [];

        function renderMovies(movies) {
            const grid = document.getElementById('movieGrid');
            if (!movies || movies.length === 0) {
                grid.innerHTML = '<div class="empty">😕 Фильмы не найдены</div>';
                return;
            }
            grid.innerHTML = movies.map(m => `
                <div class="movie-card" onclick="window.open('${m.link}', '_blank')">
                    <img src="${m.poster}" alt="${m.title}" loading="lazy" onerror="this.src='https://via.placeholder.com/300x450/1a1a2e/6c5ce7?text=No+Poster'">
                    <div class="info">
                        <div class="title">${m.title}</div>
                        ${m.year ? `<div class="year">📅 ${m.year}</div>` : ''}
                    </div>
                    <div class="badge">▶ Смотреть</div>
                </div>
            `).join('');
            document.getElementById('count').textContent = movies.length;
        }

        function filterMovies() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            if (!query) { renderMovies(allMovies); return; }
            renderMovies(allMovies.filter(m => m.title.toLowerCase().includes(query) || m.year.includes(query)));
        }

        function toggleTheme() {
            const html = document.documentElement;
            const btn = document.querySelector('.theme-toggle');
            if (html.getAttribute('data-theme') === 'light') {
                html.removeAttribute('data-theme');
                btn.textContent = '🌙 Тёмная';
            } else {
                html.setAttribute('data-theme', 'light');
                btn.textContent = '☀️ Светлая';
            }
        }

        // Загрузка данных
        if (MOVIES_DATA.length > 0) {
            allMovies = MOVIES_DATA;
            renderMovies(allMovies);
        } else {
            document.getElementById('movieGrid').innerHTML = `
                <div class="error">
                    ❌ Данные не загружены.<br><br>
                    <button onclick="location.reload()" style="padding:12px 30px;border-radius:30px;border:none;background:var(--accent);color:#fff;font-size:16px;cursor:pointer;">
                        🔄 Обновить
                    </button>
                    <br><br>
                    <span style="font-size:14px;opacity:0.6;">Или сохрани страницу tevas.work и пришли мне — я соберу данные за 2 минуты</span>
                </div>
            `;
        }
    </script>
</body>
</html>
