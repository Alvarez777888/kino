<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KinoMoz — фильмы и сериалы</title>
    <style>
        /* ===== ОСНОВНЫЕ СТИЛИ ===== */
        :root {
            --bg: #0a0a0f;
            --card: #16161d;
            --text: #eee;
            --accent: #e50914;
            --accent-hover: #ff1a2a;
            --border: #2a2a35;
            --radius: 14px;
            --shadow: rgba(229, 9, 20, 0.4);
            --transition: 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        [data-theme="light"] {
            --bg: #f0f0f5;
            --card: #ffffff;
            --text: #1a1a1f;
            --border: #ddd;
            --shadow: rgba(0,0,0,0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
            padding: 0 12px 30px;
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
        }

        /* ===== ХЕДЕР ===== */
        header {
            background: rgba(10,10,15,0.92);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            border-bottom: 2px solid var(--accent);
            backdrop-filter: blur(12px);
            margin: 0 -12px 16px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo {
            font-size: 26px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent), #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .logo span {
            font-weight: 300;
            -webkit-text-fill-color: var(--text);
            font-size: 14px;
        }
        .header-controls {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .header-controls .count {
            font-size: 13px;
            opacity: 0.6;
            background: var(--card);
            padding: 4px 14px;
            border-radius: 16px;
            border: 1px solid var(--border);
        }
        .theme-toggle {
            background: var(--card);
            border: 2px solid var(--border);
            color: var(--text);
            padding: 6px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: var(--transition);
            min-width: 44px;
            min-height: 44px;
        }
        .theme-toggle:hover {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        /* ===== ПРИВЕТСТВЕННЫЙ ЭКРАН ===== */
        .welcome-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 70vh;
            text-align: center;
            animation: fadeIn 0.8s ease;
        }
        .welcome-screen h1 {
            font-size: 48px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent), #ff6b6b, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }
        .welcome-screen p {
            font-size: 18px;
            opacity: 0.6;
            max-width: 500px;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== НАВИГАЦИЯ ===== */
        .nav-tabs {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            max-width: 1400px;
            margin: 0 auto 16px;
        }
        .nav-tabs button {
            background: var(--card);
            border: 2px solid var(--border);
            color: var(--text);
            padding: 8px 24px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: var(--transition);
            min-height: 42px;
        }
        .nav-tabs button:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }
        .nav-tabs button.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
            box-shadow: 0 4px 25px var(--shadow);
        }

        /* ===== ПОИСК ===== */
        .search-bar {
            max-width: 1400px;
            margin: 0 auto 14px;
        }
        .search-bar input {
            width: 100%;
            padding: 12px 20px;
            border-radius: 30px;
            border: 2px solid var(--border);
            background: var(--card);
            color: var(--text);
            font-size: 15px;
            transition: var(--transition);
            outline: none;
        }
        .search-bar input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 25px var(--shadow);
        }

        /* ===== СЕТКА КАРТОЧЕК ===== */
        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 18px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .movie-card {
            background: var(--card);
            border-radius: var(--radius);
            overflow: hidden;
            transition: var(--transition);
            cursor: pointer;
            border: 2px solid transparent;
            position: relative;
        }
        /* 🔥 КРАСНЫЙ ГРАДИЕНТ ПРИ НАВЕДЕНИИ */
        .movie-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: transparent;
            background: linear-gradient(135deg, var(--accent), #ff6b6b);
            box-shadow: 0 12px 40px var(--shadow);
        }
        .movie-card:hover .info {
            background: transparent;
        }
        .movie-card:hover .title {
            color: #fff;
        }
        .movie-card:hover .year {
            color: rgba(255,255,255,0.8);
        }
        .movie-card img {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
            display: block;
            background: #1a1a2e;
            transition: var(--transition);
        }
        .movie-card:hover img {
            filter: brightness(0.85);
        }
        .movie-card .info {
            padding: 10px 12px 12px;
            transition: var(--transition);
        }
        .movie-card .title {
            font-weight: 600;
            font-size: 14px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.3;
            transition: var(--transition);
        }
        .movie-card .year {
            font-size: 12px;
            opacity: 0.6;
            margin-top: 3px;
            transition: var(--transition);
        }
        .movie-card .badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--accent);
            color: #fff;
            padding: 2px 12px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 700;
            box-shadow: 0 2px 12px rgba(229,9,20,0.5);
        }
        .movie-card .type-badge {
            position: absolute;
            bottom: 60px;
            left: 10px;
            background: rgba(0,0,0,0.75);
            color: #fff;
            padding: 2px 10px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 600;
            backdrop-filter: blur(4px);
        }

        /* ===== ПАГИНАЦИЯ ===== */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            max-width: 1400px;
            margin: 30px auto 0;
            flex-wrap: wrap;
        }
        .pagination button {
            background: var(--card);
            border: 2px solid var(--border);
            color: var(--text);
            padding: 10px 28px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: var(--transition);
            min-height: 44px;
        }
        .pagination button:hover:not(:disabled) {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
            transform: scale(1.04);
        }
        .pagination button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
        }
        .pagination .info {
            font-size: 14px;
            opacity: 0.6;
            padding: 0 10px;
        }

        /* ===== СОСТОЯНИЯ ===== */
        .loading, .empty {
            text-align: center;
            padding: 60px 16px;
            font-size: 17px;
            opacity: 0.7;
            grid-column: 1 / -1;
        }
        .footer {
            text-align: center;
            margin-top: 40px;
            opacity: 0.4;
            font-size: 12px;
            border-top: 1px solid var(--border);
            padding-top: 20px;
        }

        /* ===== АДАПТИВ ===== */
        @media (max-width: 600px) {
            .movie-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; }
            .logo { font-size: 20px; }
            .welcome-screen h1 { font-size: 32px; }
            .welcome-screen p { font-size: 15px; }
            header { padding: 8px 12px; flex-direction: column; align-items: stretch; }
            .header-controls { justify-content: space-between; }
            .nav-tabs button { padding: 6px 14px; font-size: 12px; min-height: 34px; }
            .search-bar input { padding: 10px 14px; font-size: 14px; }
            .pagination button { padding: 8px 18px; font-size: 13px; min-height: 38px; }
        }
        @media (max-width: 400px) {
            .movie-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .movie-card { animation: fadeInUp 0.35s ease both; }
    </style>
</head>

            grid.style.display = 'none';
            pagination.style.display = 'none';
            
            // Автоматически переходим к контенту через 2 секунды
            setTimeout(() => {
                welcome.style.display = 'none';
                nav.style.display = 'flex';
                search.style.display = 'block';
                grid.style.display = 'grid';
                pagination.style.display = 'flex';
                renderPage();
                document.getElementById('movieCount').textContent = allMovies.length + ' контента';
                document.getElementById('updateTime').textContent = new Date().toLocaleString();
            }, 2000);
        }

        function renderPage() {
            const grid = document.getElementById('movieGrid');
            const totalPages = Math.ceil(filteredMovies.length / ITEMS_PER_PAGE) || 1;
            
            if (currentPage > totalPages) currentPage = totalPages;
            if (currentPage < 1) currentPage = 1;

            const start = (currentPage - 1) * ITEMS_PER_PAGE;
            const end = Math.min(start + ITEMS_PER_PAGE, filteredMovies.length);
            const pageMovies = filteredMovies.slice(start, end);

            if (filteredMovies.length === 0) {
                grid.innerHTML = `<div class="empty">😕 Ничего не найдено</div>`;
                updatePagination(0, 1);
                return;
            }

            grid.innerHTML = pageMovies.map((m, index) => {
                const typeLabel = m.type === 'movie' ? '🎬 Фильм' : '📺 Сериал';
                return `
                    <div class="movie-card" onclick="window.open('${m.linkUrl}', '_blank')" style="animation-delay: ${(index % 12) * 0.02}s;">
                        <img src="${m.posterUrl}" alt="${m.title}" loading="lazy" 
                             onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 200 300%22><rect fill=%22%231a1a2e%22 width=%22200%22 height=%22300%22/><text x=%2250%%22 y=%2250%%22 text-anchor=%22middle%22 dominant-baseline=%22central%22 fill=%22%23666%22 font-size=%2216%22>${encodeURIComponent(m.title)}</text></svg>'">
                        <div class="info">
                            <div class="title">${m.title}</div>
                            ${m.year ? `<div class="year">📅 ${m.year}</div>` : ''}
                        </div>
                        <div class="badge">▶</div>
                        <div class="type-badge">${typeLabel}</div>
                    </div>
                `;
            }).join('');

            updatePagination(filteredMovies.length, totalPages);
            document.getElementById('movieCount').textContent = filteredMovies.length + ' из ' + allMovies.length;
        }

        function updatePagination(total, totalPages) {
            document.getElementById('prevPage').disabled = currentPage <= 1;
            document.getElementById('nextPage').disabled = currentPage >= totalPages;
            const start = (currentPage - 1) * ITEMS_PER_PAGE + 1;
            const end = Math.min(currentPage * ITEMS_PER_PAGE, total);
            document.getElementById('pageInfo').textContent = total > 0 ? `${start}-${end} из ${total}` : '0';
        }

        function changePage(delta) {
            const totalPages = Math.ceil(filteredMovies.length / ITEMS_PER_PAGE) || 1;
            const newPage = currentPage + delta;
            if (newPage >= 1 && newPage <= totalPages) {
                currentPage = newPage;
                renderPage();
                document.querySelector('.movie-grid').scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        function filterMovies() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            let filtered = allMovies;

            if (currentFilter !== 'all') {
                filtered = filtered.filter(m => m.type === currentFilter);
            }

            if (query) {
                filtered = filtered.filter(m => m.title.toLowerCase().includes(query));
            }

            filteredMovies = filtered;
            currentPage = 1;
            renderPage();
        }

        // ===== НАВИГАЦИЯ =====
        document.getElementById('navTabs').addEventListener('click', (e) => {
            const btn = e.target.closest('button');
            if (!btn) return;
            document.querySelectorAll('#navTabs button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.dataset.filter;
            document.getElementById('searchInput').value = '';
            filterMovies();
        });

        // ===== ТЕМА =====
        function toggleTheme() {
            const html = document.documentElement;
            const btn = document.querySelector('.theme-toggle');
            const isLight = html.getAttribute('data-theme') === 'light';
            if (isLight) {
                html.removeAttribute('data-theme');
                btn.textContent = '🌙';
                localStorage.setItem('theme', 'dark');
            } else {
                html.setAttribute('data-theme', 'light');
                btn.textContent = '☀️';
                localStorage.setItem('theme', 'light');
            }
        }

        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
            document.querySelector('.theme-toggle').textContent = '☀️';
        }

        // ===== ЗАПУСК =====
        initMovies();
    </script>

</body>
</html>
