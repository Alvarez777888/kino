<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KINO — Современный кинотеатр</title>
    <style>
        /* ===== ОСНОВНЫЕ СТИЛИ ===== */
        :root {
            --bg: #0a0a0f;
            --card: #16161d;
            --text: #eee;
            --accent: #e50914;
            --accent-hover: #ff1a2a;
            --shadow: rgba(229, 9, 20, 0.4);
            --header-bg: #0d0d12;
        }
        [data-theme="light"] {
            --bg: #f0f0f5;
            --card: #ffffff;
            --text: #1a1a1f;
            --accent: #e50914;
            --accent-hover: #b20710;
            --shadow: rgba(0,0,0,0.15);
            --header-bg: #ffffff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
            transition: background 0.3s, color 0.3s;
            padding: 0 20px 40px;
            min-height: 100vh;
        }
        /* ===== ХЕДЕР ===== */
        header {
            background: var(--header-bg);
            padding: 16px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            border-radius: 0 0 20px 20px;
            box-shadow: 0 4px 30px rgba(0,0,0,0.5);
            margin: 0 -20px 30px;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--accent);
        }
        .logo {
            font-size: 30px;
            font-weight: 900;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--accent), #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .logo span {
            font-weight: 300;
            background: none;
            -webkit-text-fill-color: var(--text);
            font-size: 18px;
        }
        .header-controls {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .theme-toggle {
            background: var(--card);
            border: 2px solid var(--accent);
            color: var(--text);
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: 0.3s;
        }
        .theme-toggle:hover {
            background: var(--accent);
            color: #fff;
            transform: scale(1.05);
        }
        .movie-count {
            font-size: 14px;
            opacity: 0.6;
            background: var(--card);
            padding: 6px 16px;
            border-radius: 20px;
        }
        /* ===== ПОИСК ===== */
        .search-bar {
            max-width: 1400px;
            margin: 0 auto 30px;
        }
        .search-bar input {
            width: 100%;
            padding: 16px 25px;
            border-radius: 50px;
            border: 2px solid var(--card);
            background: var(--card);
            color: var(--text);
            font-size: 16px;
            transition: 0.3s;
            outline: none;
        }
        .search-bar input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 30px var(--shadow);
        }
        .search-bar input::placeholder {
            opacity: 0.5;
        }
        /* ===== СЕТКА ФИЛЬМОВ ===== */
        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .movie-card {
            background: var(--card);
            border-radius: 16px;
            overflow: hidden;
            transition: 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            position: relative;
            border: 1px solid transparent;
        }
        .movie-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 12px 50px var(--shadow);
            border-color: var(--accent);
        }
        .movie-card img {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
            display: block;
            background: #1a1a2e;
        }
        .movie-card .info {
            padding: 12px 15px 15px;
        }
        .movie-card .title {
            font-weight: 600;
            font-size: 15px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.3;
        }
        .movie-card .badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--accent);
            color: #fff;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 2px 10px rgba(229, 9, 20, 0.5);
        }
        .movie-card .year {
            opacity: 0.5;
            font-size: 13px;
            margin-top: 4px;
        }
        /* ===== СОСТОЯНИЯ ===== */
        .loading, .error, .empty {
            text-align: center;
            padding: 80px 20px;
            font-size: 18px;
            opacity: 0.7;
            grid-column: 1 / -1;
        }
        .error { color: #ff6b6b; opacity: 1; }
        .error button {
            margin-top: 20px;
            padding: 12px 35px;
            border-radius: 30px;
            border: none;
            background: var(--accent);
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        .error button:hover { transform: scale(1.05); background: var(--accent-hover); }
        /* ===== ПОДВАЛ ===== */
        .footer {
            text-align: center;
            margin-top: 50px;
            opacity: 0.4;
            font-size: 14px;
            border-top: 1px solid var(--card);
            padding-top: 25px;
        }
        /* ===== АДАПТИВ ===== */
        @media (max-width: 600px) {
            .movie-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
            .logo { font-size: 22px; }
            header { padding: 12px 15px; margin: 0 -20px 20px; flex-direction: column; align-items: stretch; }
            .header-controls { justify-content: space-between; }
            .search-bar input { padding: 13px 18px; font-size: 14px; }
        }
        @media (max-width: 400px) {
            .movie-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; }
        }
    </style>
</head>
<body>

    <!-- ===== ХЕДЕР ===== -->
    <header>
        <div class="logo">🎬 TEVAS <span>клон</span></div>
        <div class="header-controls">
            <span class="movie-count" id="movieCount">0 фильмов</span>
            <button class="theme-toggle" onclick="toggleTheme()">🌙 Тёмная</button>
        </div>
    </header>

    <!-- ===== ПОИСК ===== -->
    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="🔍 Искать фильмы и сериалы..." oninput="filterMovies()">
    </div>

    <!-- ===== СЕТКА ===== -->
    <div class="movie-grid" id="movieGrid">
        <div class="loading">⏳ Загрузка фильмов...</div>
    </div>

    <!-- ===== ПОДВАЛ ===== -->
    <div class="footer">
        Данные собраны с TEVAS • Сделано с ❤️ • Обновлено: <span id="updateTime"></span>
    </div>

    <script>
        // ============================================================
        //  ВСЕ ФИЛЬМЫ ИЗ ТВОЕГО HTML-ФАЙЛА (извлечены автоматически)
        // ============================================================
        const MOVIES_DATA = [
            // === Фильмы из карусели ===
            { title: "Железное легкое", poster: "zheleznoe_legkoe.jpg", link: "https://pult.tevas.dev/kino/download/?f=Zheleznoe_legkoe_2026.mp4&big=982&tag=flik" },
            { title: "Грязные деньги TEVAS", poster: "gryaznye_d.jpg", link: "https://pult.tevas.dev/kino/download/?f=Gryaznye_dengi_TEVAS_2026.mp4&big=982&tag=flik" },
            { title: "Дьявол носит Prada 2", poster: "dyavol_np2.jpg", link: "https://pult.tevas.dev/kino/download/?f=Dyavol_nosit_Prada_2_TEVAS_2026.mp4&big=982&tag=flik" },
            { title: "Mortal Kombat 2", poster: "mortal_2.jpg", link: "https://pult.tevas.dev/kino/download/?f=Mortal_kombat_2_TEVAS_2026.mp4&big=982&tag=flik" },
            
            // === Сериалы из карусели ===
            { title: "Ранчо Даттонов", poster: "rancho_d.jpg", link: "https://pult.tevas.dev/serial/all/rancho_dattonov/?big=982&tag=flik" },
            { title: "Паук Нуар", poster: "pauk2026.jpg", link: "https://pult.tevas.dev/serial/top/pauk_nuar/?big=982&tag=flik" },
            { title: "Вне кампуса", poster: "vne_kampusa2026.jpg", link: "https://pult.tevas.dev/serial/all/vne_kampusa/?big=982&tag=flik" },
            { title: "Извне", poster: "izvne.jpg", link: "https://pult.tevas.dev/serial/izvne/?big=982&tag=flik" },
        ];

        // ============================================================
        //  ДОПОЛНИТЕЛЬНЫЕ ФИЛЬМЫ (которые были на главной странице)
        //  Добавь сюда любые другие фильмы из папки /kino/
        // ============================================================
        // Пример добавления:
        // { title: "Холоп 3", poster: "holop3.jpg", link: "https://pult.tevas.dev/kino/download/?f=Holop_3_2026.mp4" },

        // ============================================================
        //  ЛОГИКА РАБОТЫ
        // ============================================================
        let allMovies = [];

        function initMovies() {
            // Добавляем фильмы из MOVIES_DATA и убираем дубли
            const seen = new Set();
            const unique = [];
            MOVIES_DATA.forEach(m => {
                const key = m.title.toLowerCase();
                if (!seen.has(key)) {
                    seen.add(key);
                    unique.push({ ...m });
                }
            });
            allMovies = unique;
            renderMovies(allMovies);
            document.getElementById('movieCount').textContent = allMovies.length + ' фильмов';
            document.getElementById('updateTime').textContent = new Date().toLocaleString();
        }

        function renderMovies(movies) {
            const grid = document.getElementById('movieGrid');
            if (!movies || movies.length === 0) {
                grid.innerHTML = `<div class="empty">😕 Ничего не найдено<br><span style="font-size:14px;opacity:0.5;">Попробуйте другой запрос</span></div>`;
                return;
            }
            grid.innerHTML = movies.map((m, index) => `
                <div class="movie-card" onclick="window.open('${m.link}', '_blank')" style="animation: fadeIn 0.4s ease ${index * 0.05}s both;">
                    <img src="${m.poster}" alt="${m.title}" loading="lazy" 
                         onerror="this.src='https://via.placeholder.com/300x450/1a1a2e/e50914?text=${encodeURIComponent(m.title)}'">
                    <div class="info">
                        <div class="title">${m.title}</div>
                        <div class="year">🎬 Фильм</div>
                    </div>
                    <div class="badge">▶ Смотреть</div>
                </div>
            `).join('');
        }

        function filterMovies() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            if (!query) { renderMovies(allMovies); return; }
            const filtered = allMovies.filter(m => 
                m.title.toLowerCase().includes(query)
            );
            renderMovies(filtered);
        }

        function toggleTheme() {
            const html = document.documentElement;
            const btn = document.querySelector('.theme-toggle');
            if (html.getAttribute('data-theme') === 'light') {
                html.removeAttribute('data-theme');
                btn.textContent = '🌙 Тёмная';
            } else {
                html.setAttribute('data-theme', 'light');
                btn.textContent = '☀️ Светлая';
            }
        }

        // Добавляем анимацию появления
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(20px); }
                to { opacity: 1; transform: translateY(0); }
            }
        `;
        document.head.appendChild(style);

        // Запускаем
        initMovies();
    </script>

</body>
</html>
