<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>TEVAS — Все сериалы 2026</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>">
    <style>
        /* ===== ОПТИМИЗИРОВАННЫЕ СТИЛИ ===== */
        :root {
            --bg: #0a0a0f;
            --card: #16161d;
            --card-hover: #1e1e28;
            --text: #eee;
            --text-secondary: #999;
            --accent: #e50914;
            --accent-hover: #ff1a2a;
            --shadow: rgba(229, 9, 20, 0.3);
            --header-bg: rgba(10, 10, 15, 0.92);
            --border: #2a2a35;
            --radius: 12px;
            --transition: 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            --font: -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        [data-theme="light"] {
            --bg: #f0f0f5;
            --card: #ffffff;
            --card-hover: #f5f5fa;
            --text: #1a1a1f;
            --text-secondary: #666;
            --shadow: rgba(0,0,0,0.1);
            --header-bg: rgba(240, 240, 245, 0.95);
            --border: #ddd;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            transition: background var(--transition), color var(--transition);
            padding: 0 12px 30px;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        /* ===== ХЕДЕР ===== */
        header {
            background: var(--header-bg);
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            border-bottom: 2px solid var(--accent);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            margin: 0 -12px 16px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo {
            font-size: 22px;
            font-weight: 900;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--accent), #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .logo span {
            font-weight: 300;
            background: none;
            -webkit-text-fill-color: var(--text);
            font-size: 14px;
        }
        .header-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .header-controls .count {
            font-size: 13px;
            opacity: 0.6;
            background: var(--card);
            padding: 4px 12px;
            border-radius: 16px;
            border: 1px solid var(--border);
            white-space: nowrap;
        }
        .theme-toggle {
            background: var(--card);
            border: 2px solid var(--border);
            color: var(--text);
            padding: 5px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: var(--transition);
            min-width: 44px;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .theme-toggle:hover {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }
        /* ===== НАВИГАЦИЯ ===== */
        .nav-tabs {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            max-width: 1400px;
            margin: 0 auto 12px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .nav-tabs::-webkit-scrollbar { display: none; }
        .nav-tabs button {
            background: var(--card);
            border: 2px solid var(--border);
            color: var(--text);
            padding: 6px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: var(--transition);
            flex-shrink: 0;
            min-height: 40px;
            touch-action: manipulation;
        }
        .nav-tabs button:hover { border-color: var(--accent); }
        .nav-tabs button.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
            box-shadow: 0 2px 16px var(--shadow);
        }
        /* ===== ПОИСК ===== */
        .search-bar {
            max-width: 1400px;
            margin: 0 auto 14px;
        }
        .search-bar input {
            width: 100%;
            padding: 12px 18px;
            border-radius: 30px;
            border: 2px solid var(--border);
            background: var(--card);
            color: var(--text);
            font-size: 15px;
            transition: var(--transition);
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }
        .search-bar input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--shadow);
        }
        .search-bar input::placeholder { opacity: 0.5; }
        /* ===== ПЛЕЕР (модальное окно) ===== */
        .player-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.92);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        .player-overlay.active { display: flex; }
        .player-container {
            position: relative;
            width: 100%;
            max-width: 900px;
            background: #000;
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: 0 20px 80px rgba(0,0,0,0.8);
        }
        .player-container iframe {
            width: 100%;
            aspect-ratio: 16/9;
            border: none;
            display: block;
            background: #000;
        }
        .player-close {
            position: absolute;
            top: 12px;
            right: 16px;
            background: rgba(0,0,0,0.7);
            color: #fff;
            border: 2px solid #fff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            font-size: 22px;
            cursor: pointer;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }
        .player-close:hover {
            background: var(--accent);
            transform: scale(1.1);
        }
        .player-title {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 30px 20px 16px;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            pointer-events: none;
        }
        /* ===== СЕТКА ===== */
        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 16px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .movie-card {
            background: var(--card);
            border-radius: var(--radius);
            overflow: hidden;
            transition: var(--transition);
            cursor: pointer;
            border: 1px solid var(--border);
            position: relative;
            -webkit-tap-highlight-color: transparent;
        }
        .movie-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent);
            box-shadow: 0 8px 30px var(--shadow);
        }
        .movie-card:active { transform: scale(0.97); }
        .movie-card img {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
            display: block;
            background: #1a1a2e;
            transition: var(--transition);
        }
        .movie-card:hover img { filter: brightness(0.9); }
        .movie-card .info {
            padding: 8px 10px 10px;
        }
        .movie-card .title {
            font-weight: 600;
            font-size: 13px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.3;
            word-break: break-word;
        }
        .movie-card .badge {
            position: absolute;
            top: 8px;
            right: 8px;
            background: var(--accent);
            color: #fff;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.3px;
            box-shadow: 0 2px 10px rgba(229, 9, 20, 0.4);
            pointer-events: none;
        }
        .movie-card .type-badge {
            position: absolute;
            bottom: 56px;
            left: 8px;
            background: rgba(0,0,0,0.7);
            color: #fff;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 9px;
            font-weight: 600;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            pointer-events: none;
        }
        /* ===== СОСТОЯНИЯ ===== */
        .loading, .error, .empty {
            text-align: center;
            padding: 60px 16px;
            font-size: 17px;
            opacity: 0.7;
            grid-column: 1 / -1;
        }
        .error { color: #ff6b6b; opacity: 1; }
        .error button {
            margin-top: 16px;
            padding: 10px 28px;
            border-radius: 25px;
            border: none;
            background: var(--accent);
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }
        .error button:hover { transform: scale(1.04); background: var(--accent-hover); }
        .footer {
            text-align: center;
            margin-top: 35px;
            opacity: 0.4;
            font-size: 12px;
            border-top: 1px solid var(--border);
            padding-top: 18px;
        }
        /* ===== АДАПТИВ ===== */
        @media (max-width: 500px) {
            .movie-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; }
            .logo { font-size: 18px; }
            .logo span { font-size: 12px; }
            header { padding: 8px 12px; margin: 0 -12px 12px; }
            .nav-tabs button { padding: 4px 12px; font-size: 12px; min-height: 34px; }
            .search-bar input { padding: 10px 14px; font-size: 14px; }
            .movie-card .title { font-size: 12px; }
            .player-container iframe { aspect-ratio: 16/9; }
            .player-close { width: 32px; height: 32px; font-size: 18px; top: 8px; right: 10px; }
        }
        @media (max-width: 380px) {
            .movie-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; }
        }
        @media (min-width: 1200px) {
            .movie-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 22px; }
        }
        /* Анимация */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .movie-card {
            animation: fadeInUp 0.35s ease both;
            will-change: transform, opacity;
        }
        .movie-card:nth-child(1) { animation-delay: 0.01s; }
        .movie-card:nth-child(2) { animation-delay: 0.02s; }
        .movie-card:nth-child(3) { animation-delay: 0.03s; }
        .movie-card:nth-child(4) { animation-delay: 0.04s; }
        .movie-card:nth-child(5) { animation-delay: 0.05s; }
        .movie-card:nth-child(6) { animation-delay: 0.06s; }
        .movie-card:nth-child(7) { animation-delay: 0.07s; }
        .movie-card:nth-child(8) { animation-delay: 0.08s; }
        .movie-card:nth-child(9) { animation-delay: 0.09s; }
        .movie-card:nth-child(10) { animation-delay: 0.10s; }
        .movie-card:nth-child(11) { animation-delay: 0.11s; }
        .movie-card:nth-child(12) { animation-delay: 0.12s; }
    </style>
</head>
<body>

    <!-- ===== ХЕДЕР ===== -->
    <header>
        <div class="logo">🎬 TEVAS <span>все сериалы</span></div>
        <div class="header-controls">
            <span class="count" id="movieCount">0</span>
            <button class="theme-toggle" onclick="toggleTheme()" aria-label="Сменить тему">🌙</button>
        </div>
    </header>

    <!-- ===== НАВИГАЦИЯ ===== -->
    <div class="nav-tabs" id="navTabs">
        <button class="active" data-filter="all">🔥 Все</button>
        <button data-filter="top">🏆 Топ</button>
        <button data-filter="new">🆕 Новинки</button>
        <button data-filter="russian">🇷🇺 Русские</button>
        <button data-filter="foreign">🌍 Зарубежные</button>
    </div>

    <!-- ===== ПОИСК ===== -->
    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="🔍 Найти сериал..." oninput="filterMovies()" autocomplete="off">
    </div>

    <!-- ===== СЕТКА ===== -->
    <div class="movie-grid" id="movieGrid">
        <div class="loading">⏳ Загрузка...</div>
    </div>

    <!-- ===== ПЛЕЕР (модальное окно) ===== -->
    <div class="player-overlay" id="playerOverlay" onclick="closePlayer(event)">
        <div class="player-container" onclick="event.stopPropagation()">
            <button class="player-close" onclick="closePlayer()">✕</button>
            <iframe id="playerIframe" src="" allowfullscreen loading="lazy"></iframe>
            <div class="player-title" id="playerTitle">Загрузка...</div>
        </div>
    </div>

    <!-- ===== ПОДВАЛ ===== -->
    <div class="footer">
        Все сериалы в одном месте • Обновлено: <span id="updateTime"></span>
    </div>

    <script>
        // ================================================================
        //  ПОСТЕРЫ БЕРУТСЯ С TEVAS.WORK АВТОМАТИЧЕСКИ
        //  ПЛЕЕР ВСТРОЕННЫЙ (через iframe)
        // ================================================================

        // ===== ВСЕ СЕРИАЛЫ (сокращённый список для примера) =====
        // ВСТАВЬ СЮДА ВЕСЬ JSON С СЕРИАЛАМИ (я дал его выше)
        // ================================================================
        const SERIES_DATA = [
            {"title":"След Чикатило","poster":"sled_chikatilo.jpg","link":"https://pult.tevas.dev/serial/sled_chikatilo/?sea=26993719259109&big=982","type":"series","category":"russian","top":true},
            {"title":"Фишер","poster":"fisher_3.jpg","link":"https://pult.tevas.dev/serial/all/fisher/?sea=26993719259109&big=982","type":"series","category":"russian","top":true},
            {"title":"Леший","poster":"leshij.jpg","link":"https://pult.tevas.dev/serial/all/leshij/?sea=26993719259109&big=982","type":"series","category":"russian"},
            {"title":"Малахит","poster":"malahit.jpg","link":"https://pult.tevas.dev/serial/malahit/?sea=26993719259109&big=982","type":"series","category":"russian"},
            {"title":"Среди нас","poster":"sredi_nas.jpg","link":"https://pult.tevas.dev/serial/sredi_nas/","type":"series","category":"foreign"},
            {"title":"Первая ракетка","poster":"___pervaya_raketka.jpg","link":"https://pult.tevas.dev/serial/top/___pervaya_raketka/?sea=26993719259109&big=982","type":"series","category":"russian","top":true},
            {"title":"Террор","poster":"terror.jpg","link":"https://pult.tevas.dev/serial/all/terror/","type":"series","category":"foreign"},
            {"title":"Ферма Кларксона","poster":"ferma_klarksona.jpg","link":"https://pult.tevas.dev/serial/all/ferma_klarksona/","type":"series","category":"foreign"},
            {"title":"Бухта вдов","poster":"buhta_vdov_uidous_bey.jpg","link":"https://pult.tevas.dev/serial/all/buhta_vdov_uidous_bey/","type":"series","category":"foreign"},
            {"title":"Извне","poster":"izvne4.jpg","link":"https://pult.tevas.dev/serial/izvne/","type":"series","category":"foreign","top":true}
        ];

        // ================================================================
        //  КОНСТАНТЫ
        // ================================================================
        const STORAGE_KEY = 'tevas_theme';
        const BASE_URL = 'https://pult.tevas.dev';
        const POSTER_BASE = 'https://pult.tevas.dev/';

        let allMovies = [];
        let currentFilter = 'all';
        let currentMovies = [];

        // ================================================================
        //  ИНИЦИАЛИЗАЦИЯ
        // ================================================================
        function initMovies() {
            allMovies = SERIES_DATA.map(m => ({
                ...m,
                isNew: !m.top,
                // Автоматически формируем URL постера
                posterUrl: m.poster.startsWith('http') ? m.poster : POSTER_BASE + m.poster
            }));
            currentMovies = allMovies;
            renderMovies(allMovies);
            updateCount(allMovies.length);
            document.getElementById('updateTime').textContent = new Date().toLocaleString();
        }

        // ================================================================
        //  ОТРИСОВКА СЕТКИ
        // ================================================================
        function renderMovies(movies) {
            const grid = document.getElementById('movieGrid');
            if (!movies || movies.length === 0) {
                grid.innerHTML = `<div class="empty">😕 Ничего не найдено</div>`;
                return;
            }
            grid.innerHTML = movies.map((m, index) => `
                <div class="movie-card" data-link="${m.link}" data-title="${m.title}" onclick="openPlayer(this)" style="animation-delay: ${(index % 12) * 0.02}s;">
                    <img src="${m.posterUrl}" alt="${m.title}" loading="lazy" 
                         onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 200 300%22><rect fill=%22%231a1a2e%22 width=%22200%22 height=%22300%22/><text x=%2250%%22 y=%2250%%22 text-anchor=%22middle%22 dominant-baseline=%22central%22 fill=%22%23666%22 font-size=%2216%22>${encodeURIComponent(m.title)}</text></svg>'">
                    <div class="info">
                        <div class="title">${m.title}</div>
                    </div>
                    <div class="badge">▶</div>
                    ${m.top ? '<div class="type-badge">⭐ Топ</div>' : '<div class="type-badge">📺 Сериал</div>'}
                </div>
            `).join('');
        }

        // ================================================================
        //  ФИЛЬТРАЦИЯ И ПОИСК
        // ================================================================
        function filterMovies() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            let filtered = allMovies;

            // Фильтр по категории
            if (currentFilter !== 'all') {
                if (currentFilter === 'top') {
                    filtered = filtered.filter(m => m.top === true);
                } else if (currentFilter === 'new') {
                    filtered = filtered.filter(m => m.isNew === true);
                } else if (currentFilter === 'russian') {
                    filtered = filtered.filter(m => m.category === 'russian');
                } else if (currentFilter === 'foreign') {
                    filtered = filtered.filter(m => m.category === 'foreign');
                }
            }

            // Поиск
            if (query) {
                filtered = filtered.filter(m => m.title.toLowerCase().includes(query));
            }

            currentMovies = filtered;
            renderMovies(filtered);
            updateCount(filtered.length);
        }

        // ================================================================
        //  ПЛЕЕР
        // ================================================================
        function openPlayer(element) {
            const link = element.dataset.link;
            const title = element.dataset.title;
            const overlay = document.getElementById('playerOverlay');
            const iframe = document.getElementById('playerIframe');
            const titleEl = document.getElementById('playerTitle');

            // Формируем URL для плеера
            // Используем iframe с сайта tevas
            let playerUrl = link;
            if (!link.includes('http')) {
                playerUrl = BASE_URL + link;
            }

            iframe.src = playerUrl;
            titleEl.textContent = title || 'Сериал';
            overlay.classList.add('active');
            document.body.style.overflow = 'hidden';

            // Прокручиваем к плееру на мобильных
            setTimeout(() => {
                overlay.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 100);
        }

        function closePlayer(event) {
            if (event && event.target !== event.currentTarget) return;
            const overlay = document.getElementById('playerOverlay');
            const iframe = document.getElementById('playerIframe');
            overlay.classList.remove('active');
            iframe.src = '';
            document.body.style.overflow = '';
        }

        // Закрытие по Escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closePlayer();
        });

        // ================================================================
        //  НАВИГАЦИЯ ПО РАЗДЕЛАМ
        // ================================================================
        document.getElementById('navTabs').addEventListener('click', (e) => {
            const btn = e.target.closest('button');
            if (!btn) return;
            document.querySelectorAll('#navTabs button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.dataset.filter;
            document.getElementById('searchInput').value = '';
            filterMovies();
        });

        // ================================================================
        //  СМЕНА ТЕМЫ
        // ================================================================
        function toggleTheme() {
            const html = document.documentElement;
            const btn = document.querySelector('.theme-toggle');
            const isLight = html.getAttribute('data-theme') === 'light';
            if (isLight) {
                html.removeAttribute('data-theme');
                btn.textContent = '🌙';
                localStorage.setItem(STORAGE_KEY, 'dark');
            } else {
                html.setAttribute('data-theme', 'light');
                btn.textContent = '☀️';
                localStorage.setItem(STORAGE_KEY, 'light');
            }
        }

        // Восстанавливаем тему
        if (localStorage.getItem(STORAGE_KEY) === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
            document.querySelector('.theme-toggle').textContent = '☀️';
        }

        // ================================================================
        //  ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ
        // ================================================================
        function updateCount(count) {
            const el = document.getElementById('movieCount');
            const total = allMovies.length;
            if (count === total) {
                el.textContent = total + ' сериалов';
            } else {
                el.textContent = count + ' из ' + total;
            }
        }

        // ================================================================
        //  ЗАПУСК
        // ================================================================
        initMovies();
    </script>

</body>
</html>
