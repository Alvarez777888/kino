<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEVAS — Все сериалы 2026</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>">
    <style>
        /* ===== КОРНЕВЫЕ ПЕРЕМЕННЫЕ ===== */
        :root {
            --bg: #0a0a0f;
            --card: #16161d;
            --card-hover: #1e1e28;
            --text: #eee;
            --text-secondary: #999;
            --accent: #e50914;
            --accent-hover: #ff1a2a;
            --shadow: rgba(229, 9, 20, 0.3);
            --header-bg: rgba(10, 10, 15, 0.92);
            --border: #2a2a35;
            --radius: 14px;
            --transition: 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        [data-theme="light"] {
            --bg: #f0f0f5;
            --card: #ffffff;
            --card-hover: #f5f5fa;
            --text: #1a1a1f;
            --text-secondary: #666;
            --shadow: rgba(0,0,0,0.1);
            --header-bg: rgba(240, 240, 245, 0.95);
            --border: #ddd;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
            transition: background var(--transition), color var(--transition);
            padding: 0 20px 40px;
            min-height: 100vh;
        }

        /* ===== ХЕДЕР ===== */
        header {
            background: var(--header-bg);
            padding: 14px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            border-bottom: 2px solid var(--accent);
            backdrop-filter: blur(12px);
            margin: 0 -20px 25px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo {
            font-size: 26px;
            font-weight: 900;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--accent), #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .logo span {
            font-weight: 300;
            background: none;
            -webkit-text-fill-color: var(--text);
            font-size: 16px;
        }
        .header-controls {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
        }
        .header-controls .count {
            font-size: 14px;
            opacity: 0.6;
            background: var(--card);
            padding: 5px 16px;
            border-radius: 20px;
            border: 1px solid var(--border);
            white-space: nowrap;
        }
        .theme-toggle {
            background: var(--card);
            border: 2px solid var(--border);
            color: var(--text);
            padding: 7px 18px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: var(--transition);
        }
        .theme-toggle:hover {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
            transform: scale(1.04);
        }

        /* ===== НАВИГАЦИЯ ===== */
        .nav-tabs {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            max-width: 1400px;
            margin: 0 auto 18px;
        }
        .nav-tabs button {
            background: var(--card);
            border: 2px solid var(--border);
            color: var(--text);
            padding: 8px 22px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: var(--transition);
        }
        .nav-tabs button:hover { border-color: var(--accent); transform: translateY(-2px); }
        .nav-tabs button.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
            box-shadow: 0 4px 25px var(--shadow);
        }

        /* ===== ПОИСК ===== */
        .search-bar {
            max-width: 1400px;
            margin: 0 auto 20px;
        }
        .search-bar input {
            width: 100%;
            padding: 15px 24px;
            border-radius: 50px;
            border: 2px solid var(--border);
            background: var(--card);
            color: var(--text);
            font-size: 16px;
            transition: var(--transition);
            outline: none;
        }
        .search-bar input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 30px var(--shadow);
        }
        .search-bar input::placeholder { opacity: 0.5; }

        /* ===== СЕТКА ===== */
        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(185px, 1fr));
            gap: 22px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .movie-card {
            background: var(--card);
            border-radius: var(--radius);
            overflow: hidden;
            transition: var(--transition);
            cursor: pointer;
            border: 1px solid var(--border);
            position: relative;
        }
        .movie-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: var(--accent);
            box-shadow: 0 12px 45px var(--shadow);
            background: var(--card-hover);
        }
        .movie-card img {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
            display: block;
            background: #1a1a2e;
        }
        .movie-card .info {
            padding: 11px 14px 14px;
        }
        .movie-card .title {
            font-weight: 600;
            font-size: 14px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.3;
        }
        .movie-card .badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--accent);
            color: #fff;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.5px;
            box-shadow: 0 2px 12px rgba(229, 9, 20, 0.5);
        }
        .movie-card .type-badge {
            position: absolute;
            bottom: 65px;
            left: 10px;
            background: rgba(0,0,0,0.75);
            color: #fff;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 600;
            backdrop-filter: blur(4px);
        }

        /* ===== СОСТОЯНИЯ ===== */
        .loading, .error, .empty {
            text-align: center;
            padding: 70px 20px;
            font-size: 18px;
            opacity: 0.7;
            grid-column: 1 / -1;
        }
        .error { color: #ff6b6b; opacity: 1; }
        .error button {
            margin-top: 18px;
            padding: 12px 35px;
            border-radius: 30px;
            border: none;
            background: var(--accent);
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }
        .error button:hover { transform: scale(1.05); background: var(--accent-hover); }

        /* ===== ПОДВАЛ ===== */
        .footer {
            text-align: center;
            margin-top: 45px;
            opacity: 0.4;
            font-size: 13px;
            border-top: 1px solid var(--border);
            padding-top: 22px;
        }

        /* ===== АДАПТИВ ===== */
        @media (max-width: 600px) {
            .movie-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 14px; }
            .logo { font-size: 20px; }
            header { padding: 10px 15px; margin: 0 -20px 15px; flex-direction: column; align-items: stretch; }
            .header-controls { justify-content: space-between; }
            .nav-tabs { gap: 5px; }
            .nav-tabs button { padding: 6px 14px; font-size: 12px; }
            .search-bar input { padding: 12px 16px; font-size: 14px; }
        }
        @media (max-width: 400px) {
            .movie-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; }
        }

        /* Анимация */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .movie-card { animation: fadeInUp 0.4s ease both; }
        .movie-card:nth-child(1) { animation-delay: 0.01s; }
        .movie-card:nth-child(2) { animation-delay: 0.03s; }
        .movie-card:nth-child(3) { animation-delay: 0.05s; }
        .movie-card:nth-child(4) { animation-delay: 0.07s; }
        .movie-card:nth-child(5) { animation-delay: 0.09s; }
        .movie-card:nth-child(6) { animation-delay: 0.11s; }
        .movie-card:nth-child(7) { animation-delay: 0.13s; }
        .movie-card:nth-child(8) { animation-delay: 0.15s; }
        .movie-card:nth-child(9) { animation-delay: 0.17s; }
        .movie-card:nth-child(10) { animation-delay: 0.19s; }
        .movie-card:nth-child(11) { animation-delay: 0.21s; }
        .movie-card:nth-child(12) { animation-delay: 0.23s; }
    </style>
</head>

        // ================================================================
        //  ЛОГИКА РАБОТЫ
        // ================================================================
        let allMovies = [];
        let currentFilter = 'all';

        function initMovies() {
            allMovies = SERIES_DATA.map(m => ({
                ...m,
                isNew: !m.top
            }));
            renderMovies(allMovies);
            document.getElementById('movieCount').textContent = allMovies.length + ' сериалов';
            document.getElementById('updateTime').textContent = new Date().toLocaleString();
        }

        function renderMovies(movies) {
            const grid = document.getElementById('movieGrid');
            if (!movies || movies.length === 0) {
                grid.innerHTML = `<div class="empty">😕 Ничего не найдено<br><span style="font-size:14px;opacity:0.5;">Попробуйте другой запрос или фильтр</span></div>`;
                return;
            }
            grid.innerHTML = movies.map((m, index) => `
                <div class="movie-card" onclick="window.open('${m.link}', '_blank')" style="animation-delay: ${(index % 12) * 0.02}s;">
                    <img src="${m.poster}" alt="${m.title}" loading="lazy" 
                         onerror="this.src='https://via.placeholder.com/300x450/1a1a2e/e50914?text=${encodeURIComponent(m.title)}'">
                    <div class="info">
                        <div class="title">${m.title}</div>
                    </div>
                    <div class="badge">▶</div>
                    ${m.top ? '<div class="type-badge">⭐ Топ</div>' : '<div class="type-badge">📺 Сериал</div>'}
                </div>
            `).join('');
        }

        function filterMovies() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            let filtered = allMovies;

            if (currentFilter !== 'all') {
                if (currentFilter === 'top') {
                    filtered = filtered.filter(m => m.top === true);
                } else if (currentFilter === 'new') {
                    filtered = filtered.filter(m => m.isNew === true);
                } else if (currentFilter === 'series') {
                    filtered = filtered.filter(m => m.type === 'series');
                } else if (currentFilter === 'russian') {
                    filtered = filtered.filter(m => m.category === 'russian');
                } else if (currentFilter === 'foreign') {
                    filtered = filtered.filter(m => m.category === 'foreign');
                }
            }

            if (query) {
                filtered = filtered.filter(m => m.title.toLowerCase().includes(query));
            }

            renderMovies(filtered);
            document.getElementById('movieCount').textContent = filtered.length + ' сериалов';
        }

        document.getElementById('navTabs').addEventListener('click', (e) => {
            const btn = e.target.closest('button');
            if (!btn) return;
            document.querySelectorAll('#navTabs button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.dataset.filter;
            document.getElementById('searchInput').value = '';
            filterMovies();
        });

        function toggleTheme() {
            const html = document.documentElement;
            const btn = document.querySelector('.theme-toggle');
            if (html.getAttribute('data-theme') === 'light') {
                html.removeAttribute('data-theme');
                btn.textContent = '🌙 Тёмная';
                localStorage.setItem('theme', 'dark');
            } else {
                html.setAttribute('data-theme', 'light');
                btn.textContent = '☀️ Светлая';
                localStorage.setItem('theme', 'light');
            }
        }

        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
            document.querySelector('.theme-toggle').textContent = '☀️ Светлая';
        }

        initMovies();
    </script>

</body>
</html>
